services:
  - type: web
    name: dreamgate
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node scripts/start-with-cron.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: GH_PAT
        sync: false
